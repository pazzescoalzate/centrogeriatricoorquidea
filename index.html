<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fundación Centro Geriátrico Orquídea · Pereira, Risaralda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
          colors: {
            wine: { DEFAULT:'#5E2744', dark:'#48182F', deep:'#371022' },
            orchid: { DEFAULT:'#A87EA5', light:'#BC99BA', pale:'#D5C2D4', mist:'#DDD6DE' },
            teal: { DEFAULT:'#7DB3A6', deep:'#518A86' },
            ink: '#241019'
          },
          boxShadow: {
            soft: '0 4px 24px -8px rgba(55,16,34,0.18)',
            lift: '0 24px 60px -24px rgba(55,16,34,0.35)'
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family:'Inter',sans-serif; margin:0; }
    @keyframes revealUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }
    @keyframes riseIn { from { transform:translateY(30px); } to { transform:none; } }
    .reveal { animation: revealUp .8s cubic-bezier(.16,1,.3,1) both; animation-timeline: view(); animation-range: entry 0% entry 32%; }
    @supports not (animation-timeline: view()) { .reveal { animation: revealUp .8s cubic-bezier(.16,1,.3,1) both; } }
    .reveal-load { animation: riseIn .9s cubic-bezier(.16,1,.3,1) both; }
    .reveal-load.delay { animation-delay:.2s; }
    @media (prefers-reduced-motion: reduce){ .reveal,.reveal-load{ animation:none; opacity:1; transform:none; } }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .floaty { animation: floaty 6s ease-in-out infinite; }
    .lb-enter { animation: lbIn .35s cubic-bezier(.16,1,.3,1); }
    @keyframes lbIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:none} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
